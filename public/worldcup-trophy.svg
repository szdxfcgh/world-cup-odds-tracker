<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <defs>
    <linearGradient id="trophyGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#CD853F"/>
    </linearGradient>
    <linearGradient id="cupBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Glow behind -->
  <ellipse cx="100" cy="120" rx="80" ry="100" fill="url(#glow)"/>
  <!-- Left handle -->
  <path d="M52 60 C20 60, 10 100, 30 120 C40 130, 48 120, 52 110" stroke="url(#trophyGold)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Right handle -->
  <path d="M148 60 C180 60, 190 100, 170 120 C160 130, 152 120, 148 110" stroke="url(#trophyGold)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Cup body -->
  <path d="M50 40 C50 40, 48 100, 65 130 C75 150, 85 155, 100 155 C115 155, 125 150, 135 130 C152 100, 150 40, 150 40 Z" fill="url(#cupBody)" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Cup rim -->
  <ellipse cx="100" cy="40" rx="50" ry="12" fill="#FFE066" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Rim highlight -->
  <ellipse cx="100" cy="38" rx="42" ry="8" fill="#FFF8DC" opacity="0.4"/>
  <!-- Horizontal bands on cup -->
  <path d="M58 65 C78 62, 122 62, 142 65" stroke="#B8860B" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M56 85 C76 82, 124 82, 144 85" stroke="#B8860B" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M60 105 C78 102, 122 102, 140 105" stroke="#B8860B" stroke-width="1" opacity="0.5" fill="none"/>
  <!-- Star at top -->
  <polygon points="100,8 103,18 113,18 105,24 108,34 100,28 92,34 95,24 87,18 97,18" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
  <!-- Stem -->
  <rect x="90" y="155" width="20" height="25" rx="3" fill="url(#trophyGold)" stroke="#B8860B" stroke-width="1"/>
  <!-- Base platform -->
  <ellipse cx="100" cy="185" rx="35" ry="8" fill="#B8860B"/>
  <ellipse cx="100" cy="183" rx="35" ry="8" fill="url(#trophyGold)" stroke="#B8860B" stroke-width="1"/>
  <!-- Base bottom -->
  <rect x="60" y="183" width="80" height="30" rx="4" fill="url(#trophyGold)" stroke="#B8860B" stroke-width="1"/>
  <ellipse cx="100" cy="213" rx="40" ry="6" fill="#B8860B" opacity="0.6"/>
  <!-- Base detail line -->
  <line x1="70" y1="195" x2="130" y2="195" stroke="#B8860B" stroke-width="0.8" opacity="0.5"/>
  <!-- Football pattern on cup -->
  <circle cx="90" cy="80" r="10" fill="white" stroke="#333" stroke-width="0.8" opacity="0.25"/>
  <path d="M90 70 L85 76 L87 82 L93 82 L95 76 Z" fill="#333" opacity="0.2"/>
  <circle cx="115" cy="95" r="8" fill="white" stroke="#333" stroke-width="0.8" opacity="0.25"/>
  <path d="M115 87 L111 92 L113 97 L117 97 L119 92 Z" fill="#333" opacity="0.2"/>
</svg>
